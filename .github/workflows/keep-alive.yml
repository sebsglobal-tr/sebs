# Render Keep-Alive
# Render'ın starter/free planlarında 15dk hareketsizlikten sonra servis uykuya geçer.
# Bu workflow her 10 dakikada bir health endpoint'i pingleyerek uyanık kalmasını sağlar.
# Devre dışı bırakmak için: GitHub → Settings → Secrets → Actions'da KEEP_ALIVE_DISABLED=true ekleyin.
name: Render Keep-Alive

on:
  schedule:
    # Her 10 dakikada bir — :00/:30 yığılmasını önlemek için :17/* seçildi
    - cron: '17,27,37,47,57 * * * *'
    - cron: '02,12,22,32,42,52 * * * *'
  workflow_dispatch: # manuel tetikleme

jobs:
  ping:
    name: Ping health endpoint
    runs-on: ubuntu-latest
    if: ${{ secrets.KEEP_ALIVE_DISABLED != 'true' }}
    steps:
      - name: Health check
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code} %{time_total}s" \
            --connect-timeout 15 \
            --max-time 30 \
            "${TARGET_URL}")
          echo "Health check: $RESPONSE"
        env:
          TARGET_URL: ${{ secrets.KEEP_ALIVE_URL || 'https://sebs-z9tr.onrender.com/api/health' }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::Keep-alive ping failed — Render servisi uyumuş olabilir. URL'yi kontrol edin."
