    <script>
        console.log('✅ Login page script loaded');
        
        // Logo error handler (CSP uyumlu)
        document.addEventListener('DOMContentLoaded', function() {
            const logoImg = document.getElementById('navLogoImg');
            if (logoImg) {
                logoImg.addEventListener('error', function() {
                    const svg = this.nextElementSibling;
                    if (svg && svg.classList.contains('nav-logo-svg')) {
                        this.style.display = 'none';
                        svg.style.display = 'inline-flex';
                    }
                });
            }
            
            // Logout button handler
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (window.supabaseAuthSystem && window.supabaseAuthSystem.logout) {
                        window.supabaseAuthSystem.logout();
                    } else if (window.logout) {
                        window.logout();
                    }
                });
            }
        });
        
        // Global error handler
        window.addEventListener('error', function(e) {
            console.error('JavaScript Error:', e);
            if (e.filename && e.filename.includes('navigation.js')) {
                console.warn('⚠️ Navigation.js yüklenirken hata oluştu. Login sayfasında navigation.js kullanılmıyor.');
                // Don't prevent default - let it show but don't break the page
            }
        }, true);
        
        // Prevent uncaught promise rejections from breaking the page
        window.addEventListener('unhandledrejection', function(e) {
            console.warn('Unhandled promise rejection:', e.reason);
        });

        // Show loading state
        function showLoading() {
            document.getElementById('loadingSpinner').style.display = 'inline-block';
            document.getElementById('btnText').textContent = 'Giriş Yapılıyor...';
            document.getElementById('loginBtn').disabled = true;
        }

        // Hide loading state
        function hideLoading() {
            document.getElementById('loadingSpinner').style.display = 'none';
            document.getElementById('btnText').textContent = 'Giriş Yap';
            document.getElementById('loginBtn').disabled = false;
        }

        // Show login status
        function showLoginStatus(message, isSuccess) {
            const statusDiv = document.getElementById('loginStatus');
            const messageDiv = document.getElementById('loginMessage');
            
            statusDiv.className = `login-status ${isSuccess ? 'success' : 'error'}`;
            messageDiv.innerHTML = message;
            statusDiv.style.display = 'block';
        }

        // Form validation
        function validateForm() {
            let isValid = true;
            
            // Clear previous errors
            document.querySelectorAll('.error-message').forEach(error => error.textContent = '');
            document.querySelectorAll('input').forEach(input => input.classList.remove('error'));

            // Email validation
            const email = document.getElementById('email').value.trim();
            if (!email) {
                document.getElementById('emailError').textContent = 'E-posta alanı zorunludur';
                document.getElementById('email').classList.add('error');
                isValid = false;
            } else if (!isValidEmail(email)) {
                document.getElementById('emailError').textContent = 'Geçerli bir e-posta adresi girin';
                document.getElementById('email').classList.add('error');
                isValid = false;
            }

            // Password validation
            const password = document.getElementById('password').value;
            if (!password) {
                document.getElementById('passwordError').textContent = 'Şifre alanı zorunludur';
                document.getElementById('password').classList.add('error');
                isValid = false;
            }

            return isValid;
        }

        // Email format validation
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        // Form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!validateForm()) {
                return;
            }

            showLoading();

            try {
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                
                console.log('🔍 Login attempt started');
                console.log('   Email:', email);
                
                // Supabase script yüklendi mi kontrol et
                if (typeof window.supabase === 'undefined') {
                    console.error('❌ Supabase script yüklenmedi!');
                    showLoginStatus(`
                        <h4><i class="fas fa-exclamation-triangle"></i> Supabase Yüklenemedi</h4>
                        <p>Supabase kütüphanesi yüklenemedi. Lütfen:</p>
                        <ul style="text-align: left; margin: 10px 0; padding-left: 20px;">
                            <li>Sayfayı yenileyin (F5 veya Ctrl+Shift+R)</li>
                            <li>Internet bağlantınızı kontrol edin</li>
                            <li>Tarayıcı console'unu kontrol edin (F12)</li>
                        </ul>
                    `, false);
                    return;
                }
                
                console.log('✅ Supabase script loaded');
                
                // Supabase client'ı başlat
                if (typeof window.initSupabase === 'undefined') {
                    console.error('❌ initSupabase fonksiyonu bulunamadı!');
                    showLoginStatus(`
                        <h4><i class="fas fa-exclamation-triangle"></i> Başlatma Hatası</h4>
                        <p>Supabase client başlatılamadı. Lütfen sayfayı yenileyin.</p>
                    `, false);
                    return;
                }
                
                console.log('⏳ Supabase client başlatılıyor...');
                await window.initSupabase();
                
                // SupabaseAuthSystem oluştur
                if (!window.supabaseAuthSystem) {
                    if (typeof SupabaseAuthSystem === 'undefined') {
                        console.error('❌ SupabaseAuthSystem class bulunamadı!');
                        showLoginStatus(`
                            <h4><i class="fas fa-exclamation-triangle"></i> Sistem Hatası</h4>
                            <p>Supabase Auth System yüklenemedi. Lütfen sayfayı yenileyin.</p>
                        `, false);
                        return;
                    }
                    console.log('⏳ SupabaseAuthSystem oluşturuluyor...');
                    window.supabaseAuthSystem = new SupabaseAuthSystem();
                    
                    // Init'in tamamlanmasını bekle
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
                
                if (!window.supabaseAuthSystem || !window.supabaseAuthSystem.supabase) {
                    console.error('❌ Supabase client oluşturulamadı!');
                    showLoginStatus(`
                        <h4><i class="fas fa-exclamation-triangle"></i> Bağlantı Hatası</h4>
                        <p>Supabase client oluşturulamadı. Lütfen sayfayı yenileyin.</p>
                    `, false);
                    return;
                }
                
                console.log('✅ Supabase client ready');
                console.log('⏳ Giriş yapılıyor...');
                
                const result = await window.supabaseAuthSystem.signIn(email, password);
                console.log('🔍 Login response:', result);
                
                if (result.success) {
                    console.log('✅ Login successful');
                    console.log('   User:', result.user.email);
                    console.log('   Session:', result.session ? 'Active' : 'Missing');
                    
                    let userRole = 'user';
                    try {
                        const apiBase = (window.location && window.location.origin) ? window.location.origin : '';
                        const meRes = await fetch(apiBase + '/api/users/me', {
                            headers: { Authorization: 'Bearer ' + result.session.access_token }
                        });
                        if (meRes.ok) {
                            const meJson = await meRes.json();
                            if (meJson.success && meJson.data && meJson.data.role) {
                                userRole = meJson.data.role;
                            }
                        }
                    } catch (e) {
                        console.warn('Rol bilgisi alınamadı (backend /api/users/me):', e);
                    }
                    const isAdmin = userRole === 'admin';
                    
                    // Check for redirect parameter in URL
                    const urlParams = new URLSearchParams(window.location.search);
                    let redirectUrl = urlParams.get('redirect');
                    
                    // If no redirect specified, use default based on role
                    // Normal kullanıcılar için her zaman dashboard.html'e yönlendir
                    if (!redirectUrl) {
                        redirectUrl = 'dashboard.html';
                    }
                    
                    // Add category and level parameters if they exist
                    const category = urlParams.get('category');
                    const level = urlParams.get('level');
                    if (category && level && redirectUrl.includes('pricing.html')) {
                        redirectUrl += `?category=${category}&level=${level}`;
                    }
                    
                    const panelName = isAdmin ? 'Admin Panel' : 'Kişisel Panel';
                    
                    console.log('   User Role:', userRole);
                    console.log('   Redirect URL:', redirectUrl);
                    
                    const buttonId = 'redirectBtn_' + Date.now();
                    showLoginStatus(`
                        <h4><i class="fas fa-check-circle"></i> Giriş Başarılı!</h4>
                        <p>Hoş geldiniz! ${panelName}inize yönlendiriliyorsunuz...</p>
                        <button id="${buttonId}" class="btn-login" style="margin-top: 15px;">
                            ${panelName}e Git
                        </button>
                    `, true);
                    
                    // Button click handler (CSP uyumlu)
                    document.getElementById(buttonId).addEventListener('click', function() {
                        window.location.href = redirectUrl;
                    });
                    
                    // Auto redirect after 2 seconds
                    setTimeout(() => {
                        window.location.href = redirectUrl;
                    }, 2000);
                    
                    // Clear form
                    document.getElementById('loginForm').reset();
                    
                } else {
                    // Email doğrulama gerekiyorsa özel mesaj göster
                    if (result.requiresEmailVerification) {
                        showLoginStatus(`
                            <h4><i class="fas fa-envelope"></i> E-posta Doğrulama Gerekli</h4>
                            <p>${result.message || 'E-posta adresinizi doğrulamanız gerekiyor. E-posta kutunuzu kontrol edin ve doğrulama linkine tıklayın.'}</p>
                            <p style="margin-top: 10px; font-size: 0.9rem; color: #64748b;">
                                <a href="/signup.html" style="color: #3b82f6;">Yeni hesap oluştur</a> veya 
                                <a href="#" id="resendVerificationLink" style="color: #3b82f6;">Doğrulama e-postasını tekrar gönder</a>
                            </p>
                        `, false);
                        
                        // Resend verification email handler
                        const resendLink = document.getElementById('resendVerificationLink');
                        if (resendLink) {
                            resendLink.addEventListener('click', async function(e) {
                                e.preventDefault();
                                try {
                                    const email = document.getElementById('email').value.trim();
                                    if (email) {
                                        const { error: resendError } = await window.supabaseAuthSystem.supabase.auth.resend({
                                            type: 'signup',
                                            email: email
                                        });
                                        if (resendError) {
                                            alert('E-posta gönderilemedi: ' + resendError.message);
                                        } else {
                                            alert('Doğrulama e-postası tekrar gönderildi!');
                                        }
                                    }
                                } catch (err) {
                                    console.error('Resend verification error:', err);
                                }
                            });
                        }
                    } else {
                        showLoginStatus(`
                            <h4><i class="fas fa-exclamation-triangle"></i> Giriş Başarısız</h4>
                            <p>${result.message || 'E-posta veya şifre hatalı. Lütfen tekrar deneyin.'}</p>
                        `, false);
                    }
                }

            } catch (error) {
                console.error('❌ Login error:', error);
                console.error('   Error type:', error.constructor.name);
                console.error('   Error message:', error.message);
                console.error('   Error stack:', error.stack);
                
                let errorMessage = 'Giriş işlemi sırasında bir hata oluştu.';
                
                if (error.message) {
                    if (error.message.includes('Supabase')) {
                        errorMessage = 'Supabase bağlantı hatası. Lütfen sayfayı yenileyin (F5).';
                    } else if (error.message.includes('network') || error.message.includes('fetch')) {
                        errorMessage = 'Sunucuya bağlanılamadı. Internet bağlantınızı kontrol edin.';
                    } else if (error.message.includes('timeout')) {
                        errorMessage = 'İstek zaman aşımına uğradı. Lütfen tekrar deneyin.';
                    } else {
                        errorMessage = error.message;
                    }
                }
                
                showLoginStatus(`
                    <h4><i class="fas fa-exclamation-triangle"></i> Hata</h4>
                    <p>${errorMessage}</p>
                    <p style="margin-top: 10px; font-size: 0.85rem; color: #64748b;">
                        Detaylar için tarayıcı console'unu kontrol edin (F12)
                    </p>
                `, false);
            } finally {
                hideLoading();
            }
        });

        // Check if already logged in (Supabase)
        async function checkIfLoggedIn() {
            try {
                // Supabase client'ı başlat
                if (typeof window.initSupabase === 'undefined') {
                    console.warn('initSupabase not available yet');
                    return false;
                }
                
                await window.initSupabase();
                
                if (!window.supabaseAuthSystem) {
                    if (typeof SupabaseAuthSystem === 'undefined') {
                        console.warn('SupabaseAuthSystem not loaded yet');
                        return false;
                    }
                    window.supabaseAuthSystem = new SupabaseAuthSystem();
                    // Init'in tamamlanmasını bekle
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
                
                if (!window.supabaseAuthSystem || !window.supabaseAuthSystem.supabase) {
                    console.warn('Supabase client not ready');
                    return false;
                }
                
                const { data: { session }, error } = await window.supabaseAuthSystem.supabase.auth.getSession();
                
                if (error) {
                    console.warn('Session check error:', error);
                    return false;
                }
                
                if (session && session.user) {
                    // Email doğrulanmamışsa login sayfasında kal
                    if (!session.user.email_confirmed_at) {
                        console.log('User not verified, staying on login page');
                        return false;
                    }
                    
                    // Normal kullanıcılar için her zaman dashboard.html'e yönlendir
                    const redirectUrl = 'dashboard.html';
                    console.log('Already logged in, redirecting to:', redirectUrl);
                    window.location.href = redirectUrl;
                    return true;
                }
            } catch (error) {
                console.error('Session check error:', error);
            }
            return false;
        }

                    console.log('   Beklenen: /js/supabase-client.js yüklenmeli');
                } else {
                    console.log('✅ initSupabase fonksiyonu mevcut');
                }
                
                // SupabaseAuthSystem class var mı?
                if (typeof SupabaseAuthSystem === 'undefined') {
                    console.error('❌ SupabaseAuthSystem class bulunamadı!');
                    console.log('   Beklenen: /js/supabase-auth.js yüklenmeli');
                } else {
                    console.log('✅ SupabaseAuthSystem class mevcut');
                }
            }, 1000);
            
            // Check for message parameter and display it
            const urlParams = new URLSearchParams(window.location.search);
            const message = urlParams.get('message');
            if (message) {
                // Show message to user
                const messageDiv = document.createElement('div');
                messageDiv.className = 'info-message';
                messageDiv.style.cssText = `
                    background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
                    color: white;
                    padding: 1rem 1.5rem;
                    border-radius: 12px;
                    margin-bottom: 1.5rem;
                    text-align: center;
                    font-size: 0.95rem;
                    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
                `;
                messageDiv.innerHTML = `<i class="fas fa-info-circle"></i> ${decodeURIComponent(message)}`;
                const loginContainer = document.querySelector('.login-container');
                if (loginContainer) {
                    loginContainer.insertBefore(messageDiv, loginContainer.firstChild);
                }
            }
            
            // Check if already logged in
            if (checkIfLoggedIn()) {
                return; // Will redirect, so don't continue
            }
            
            // Clear any existing values
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            
            if (emailInput) emailInput.value = '';
            if (passwordInput) passwordInput.value = '';
            
            // Verify form elements exist
            const form = document.getElementById('loginForm');
            if (!form) {
                console.error('❌ Login form not found!');
                return;
            }
            
            console.log('✅ Login form found, page ready');
        });
        
        // Handle 304 cache issues - force page reload if needed
        window.addEventListener('load', function() {
            console.log('✅ Login page fully loaded');
            
            // Check if page actually rendered
            const loginContainer = document.querySelector('.login-container');
            if (!loginContainer) {
                console.error('❌ Login container not found - possible cache issue');
                console.log('Try: Ctrl+Shift+R (hard refresh) to clear cache');
            } else {
                console.log('✅ Login page rendered successfully');
            }
        });
    </script>
