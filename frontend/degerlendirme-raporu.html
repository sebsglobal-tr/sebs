<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
  <script src="/js/gtag.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <base href="/">
  <title>Detaylı Değerlendirme Raporu - SEBS Global</title>
  <meta name="description" content="Quiz, simülasyon ve yapay zeka destekli kişisel öğrenme değerlendirme raporunuz.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/images/SEBS.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/saas-landing.css" />
  <link rel="stylesheet" href="/css/landing-chrome.css?v=9" />
  <link rel="stylesheet" href="/css/sebs-premium-theme.css?v=3" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/degerlendirme-raporu.css?v=6" />
</head>
<body class="sebs-premium-site landing-site-body font-sans text-slate-800 antialiased bg-slate-50">
<header class="fixed inset-x-0 top-0 z-50 border-b border-slate-200/80 bg-white/90 backdrop-blur-xl print:hidden">
  <div class="mx-auto flex h-16 max-w-5xl items-center justify-between gap-3 px-4 sm:px-6">
    <a href="/dashboard.html" class="landing-brand-link flex items-center gap-2 focus-ring rounded-lg text-sm font-semibold text-slate-700 hover:text-blue-700">
      <i class="fas fa-arrow-left"></i> Panele dön
    </a>
    <div class="flex items-center gap-2">
      <button type="button" onclick="window.print()" class="inline-flex items-center gap-2 rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50 focus-ring">
        <i class="fas fa-print"></i> Yazdır
      </button>
      <button type="button" onclick="window.loadDetailedEvaluationReport()" class="inline-flex items-center gap-2 rounded-full bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800 focus-ring">
        <i class="fas fa-sync-alt"></i> Yenile
      </button>
    </div>
  </div>
</header>

<main class="mx-auto max-w-5xl px-4 pb-16 pt-24 sm:px-6 print:pt-4">
  <div id="reportLoading" class="rounded-2xl border border-slate-200 bg-white p-12 text-center shadow-card">
    <i class="fas fa-spinner fa-spin text-3xl text-blue-600"></i>
    <p class="mt-4 text-slate-600">Detaylı raporunuz hazırlanıyor…</p>
    <p class="mt-2 text-sm text-slate-500">Modül, quiz ve simülasyon verileri analiz ediliyor.</p>
  </div>
  <div id="reportError" class="hidden rounded-xl border border-rose-200 bg-rose-50 p-6 text-rose-800"></div>
  <div id="reportRoot" class="report-root hidden space-y-6"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
<script src="/js/api-base.js"></script>
<script src="/js/supabase-env.js"></script>
<script src="/js/supabase-client.js"></script>
<script src="/js/supabase-auth.js?v=2.1"></script>
  <script src="/js/degerlendirme-raporu.js?v=6"></script>
</body>
</html>
