<!DOCTYPE html>
<html lang="tr">
<head>
  <script src="/js/gtag.js"></script>
  <script src="/js/gtag-ads.js"></script>
  <script src="/js/api-base.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="icon" type="image/png" href="/images/SEBS.png" />
  <title>Ödeme | SEBS Global</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      min-height: 100dvh;
    }
    #checkout-root { min-height: 100dvh; }
    #checkout-root iframe {
      display: block;
      width: 100%;
      min-height: 100dvh;
      border: 0;
      background: #fff;
    }
    .wrap {
      max-width: 420px;
      margin: 0 auto;
      padding: max(1.5rem, env(safe-area-inset-top)) 1.25rem max(1.5rem, env(safe-area-inset-bottom));
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="checkout-root">
    <div class="wrap" id="status">
      <div class="spinner" aria-hidden="true"></div>
      <p>iyzico ödeme sayfasına yönlendiriliyorsunuz…</p>
    </div>
  </div>
  <script>
    (function () {
      var KEY = 'sebs_iyzico_checkout';

      function escHtml(s) {
        return String(s || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function apiBase() {
        if (typeof window.getSebsApiBase === 'function') {
          return window.getSebsApiBase();
        }
        return (window.location.origin || '') + '/api';
      }

      function queryToken() {
        try {
          return new URLSearchParams(window.location.search).get('t') || '';
        } catch (e) {
          return '';
        }
      }

      function showFallback(message, actionUrl, actionLabel) {
        var root = document.getElementById('checkout-root');
        var html =
          '<div class="wrap"><p>' +
          escHtml(message) +
          '</p>';
        if (actionUrl) {
          html +=
            '<p style="margin-top:1.25rem"><a href="' +
            escHtml(actionUrl) +
            '" style="display:inline-block;padding:0.85rem 1.35rem;background:#2563eb;color:#fff;text-decoration:none;border-radius:10px;font-weight:600;font-size:1rem;">' +
            escHtml(actionLabel || 'Ödemeye devam et') +
            '</a></p>';
        }
        html +=
          '<p style="margin-top:1.25rem;font-size:0.875rem"><a href="/fiyatlandirma" style="color:#2563eb">Paketlere dön</a></p></div>';
        root.innerHTML = html;
      }

      function clearStorage() {
        try {
          sessionStorage.removeItem(KEY);
        } catch (e) {
          /* */
        }
      }

      function execScripts(root) {
        var scripts = root.querySelectorAll('script');
        for (var i = 0; i < scripts.length; i++) {
          var old = scripts[i];
          var s = document.createElement('script');
          if (old.src) {
            s.src = old.src;
            s.async = false;
          } else {
            s.text = old.text || old.textContent || '';
          }
          old.parentNode.replaceChild(s, old);
        }
      }

      function extractFormAction(html) {
        var m = html.match(/<form[^>]+action=["']([^"']+)["']/i);
        return m ? m[1] : null;
      }

      function extractBodyContent(html) {
        var bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
        return bodyMatch ? bodyMatch[1] : html;
      }

      function mountCheckoutForm(html) {
        var root = document.getElementById('checkout-root');
        root.innerHTML = extractBodyContent(html);
        execScripts(root);
        setTimeout(function () {
          var form = root.querySelector('form');
          if (form) {
            try {
              form.submit();
            } catch (e) {
              /* */
            }
          }
        }, 150);
      }

      function mountCheckoutIframe(html) {
        var root = document.getElementById('checkout-root');
        var iframe = document.createElement('iframe');
        iframe.title = 'iyzico ödeme';
        iframe.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
        iframe.srcdoc = html;
        root.innerHTML = '';
        root.appendChild(iframe);
      }

      function isMobileDevice() {
        return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(
          navigator.userAgent || ''
        );
      }

      function runCheckout(data) {
        if (!data || (!data.checkoutFormContent && !data.paymentPageUrl)) {
          showFallback('Ödeme bilgisi geçersiz. Lütfen tekrar deneyin.');
          return;
        }

        if (data.paymentPageUrl) {
          clearStorage();
          window.location.replace(data.paymentPageUrl);
          return;
        }

        var html = data.checkoutFormContent;
        var formAction = extractFormAction(html);

        try {
          if (isMobileDevice()) {
            mountCheckoutIframe(html);
          } else {
            mountCheckoutForm(html);
          }
          clearStorage();
        } catch (mountErr) {
          if (formAction) {
            showFallback(
              'Ödeme sayfası otomatik açılamadı. Devam etmek için aşağıdaki düğmeye dokunun.',
              formAction,
              'Ödemeye git'
            );
          } else {
            showFallback('Ödeme sayfası açılamadı. Lütfen tekrar deneyin veya Safari/Chrome ile deneyin.');
          }
        }
      }

      function loadFromStorage() {
        var raw;
        try {
          raw = sessionStorage.getItem(KEY);
        } catch (e) {
          raw = null;
        }
        if (!raw) return null;
        try {
          var data = JSON.parse(raw);
          if (data && data.ts && Date.now() - data.ts > 15 * 60 * 1000) {
            clearStorage();
            return null;
          }
          return data;
        } catch (e2) {
          return null;
        }
      }

      function fetchLaunch(token) {
        return fetch(
          apiBase() + '/payments/iyzico/checkout/launch?t=' + encodeURIComponent(token),
          { method: 'GET', credentials: 'omit' }
        )
          .then(function (res) {
            return res.json().then(function (body) {
              return { ok: res.ok, body: body };
            });
          })
          .then(function (result) {
            if (!result.ok || !result.body || !result.body.success) {
              var msg =
                (result.body && result.body.message) ||
                'Ödeme oturumu bulunamadı. Lütfen satın almayı tekrar başlatın.';
              throw new Error(msg);
            }
            return result.body.data;
          });
      }

      function start() {
        var token = queryToken();
        if (token) {
          fetchLaunch(token)
            .then(runCheckout)
            .catch(function (err) {
              var cached = loadFromStorage();
              if (cached) {
                runCheckout(cached);
                return;
              }
              showFallback(err.message || 'Ödeme oturumu bulunamadı.');
            });
          return;
        }

        var cached = loadFromStorage();
        if (cached) {
          runCheckout(cached);
          return;
        }

        showFallback('Ödeme oturumu bulunamadı. Lütfen fiyatlandırma sayfasından satın almayı tekrar başlatın.');
      }

      start();
    })();
  </script>
</body>
</html>
