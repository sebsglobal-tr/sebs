<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="/images/SEBS.png" />
  <title>Ödeme Başarılı | SEBS Global</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-800 antialiased">
  <main class="mx-auto flex min-h-screen max-w-lg flex-col items-center justify-center px-6 py-16 text-center">
    <div id="statusIcon" class="mb-6 flex h-20 w-20 items-center justify-center rounded-full bg-emerald-100 text-3xl text-emerald-600" aria-hidden="true">
      <i class="fas fa-check"></i>
    </div>
    <h1 class="text-2xl font-bold text-slate-900">Ödeme alındı</h1>
    <p id="statusText" class="mt-3 text-slate-600">Ödeme sunucuda doğrulanıyor…</p>
    <p id="statusHint" class="mt-2 hidden text-sm text-amber-700"></p>
    <div class="mt-8 flex flex-col gap-3 sm:flex-row sm:justify-center">
      <a href="/egitimler" class="inline-flex items-center justify-center rounded-full bg-slate-900 px-6 py-3 text-sm font-semibold text-white hover:bg-slate-800">Eğitim modülleri</a>
      <a href="/dashboard.html" class="inline-flex items-center justify-center rounded-full border border-slate-200 bg-white px-6 py-3 text-sm font-semibold text-slate-800 hover:bg-slate-50">Panele git</a>
    </div>
  </main>
  <script src="/js/session-cookie-sync.js"></script>
  <script src="/utils/access-control.js"></script>
  <script>
    (async function () {
      if (typeof syncSebsSessionCookie === 'function') await syncSebsSessionCookie();
      if (window.AccessControl && window.AccessControl.clearPurchasesCache) {
        window.AccessControl.clearPurchasesCache();
      }
      const apiP =
        typeof window.getSebsApiBase === 'function'
          ? window.getSebsApiBase()
          : (window.location.origin || '') + '/api';
      const token = localStorage.getItem('authToken');
      const params = new URLSearchParams(window.location.search);
      const conversationId = params.get('conversationId');
      const orderType = params.get('type');
      const upgraded = params.get('upgraded') === '1';
      const hintEl = document.getElementById('statusHint');

      if (upgraded) {
        document.getElementById('statusText').textContent =
          'Planınız yükseltildi. Yeni abonelik döneminiz hesabınıza tanımlandı.';
        return;
      }

      if (token && conversationId) {
        try {
          const statusRes = await fetch(
            apiP + '/payments/iyzico/status/' + encodeURIComponent(conversationId),
            { headers: { Authorization: 'Bearer ' + token } }
          );
          const statusJson = statusRes.ok ? await statusRes.json() : null;
          if (statusJson && statusJson.success && statusJson.data) {
            if (statusJson.data.paid) {
              const isSub =
                orderType === 'subscription' || statusJson.data.orderType === 'subscription';
              const periodEnd = statusJson.data.subscription && statusJson.data.subscription.current_period_end;
              let msg = isSub
                ? 'Aboneliğiniz başarıyla başlatıldı. Plan erişiminiz aktif.'
                : 'Ödeme doğrulandı. Paketiniz hesabınıza tanımlandı; modüllere hemen erişebilirsiniz.';
              if (isSub && periodEnd) {
                try {
                  const d = new Date(periodEnd);
                  msg += ' Mevcut dönem: ' + d.toLocaleDateString('tr-TR') + ' tarihine kadar.';
                } catch (e) { /* */ }
              }
              document.getElementById('statusText').textContent = msg;
            } else {
              document.getElementById('statusText').textContent =
                'Ödeme henüz onaylanmadı. Birkaç saniye bekleyip sayfayı yenileyin.';
              if (hintEl) {
                hintEl.classList.remove('hidden');
                hintEl.textContent =
                  'Erişim açılmazsa destek ile iletişime geçin; ödeme yalnızca sunucu doğrulaması ile aktifleşir.';
              }
            }
          }
        } catch (e) {
          document.getElementById('statusText').textContent =
            'Ödeme işlendi. Erişim birkaç saniye içinde aktif olacaktır.';
        }
      }

      if (token) {
        try {
          await fetch(apiP + '/users/me', {
            headers: { Authorization: 'Bearer ' + token }
          });
        } catch (e) { /* */ }
      }
    })();
  </script>
</body>
</html>
