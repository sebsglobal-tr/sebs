<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simülasyon - SEBS Global</title>
    <meta name="description" content="Bu simülasyon yakında aktif olacak.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-color: #22c55e;
            --warning-color: #facc15;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --border-color: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .coming-soon-container {
            text-align: center;
            padding: 4rem 2rem;
            max-width: 600px;
        }

        .coming-soon-icon {
            width: 120px;
            height: 120px;
            background: var(--primary-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            color: white;
            font-size: 3rem;
        }

        .coming-soon-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .coming-soon-subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .coming-soon-badge {
            display: inline-block;
            background: var(--warning-color);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 2rem;
        }

        .back-button {
            display: inline-block;
            padding: 1rem 2rem;
            background: var(--primary-gradient);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
    </style>
</head>
<body>
    <div class="coming-soon-container">
        <div class="coming-soon-icon">
            <i class="fas fa-tools"></i>
        </div>
        <h1 class="coming-soon-title">Simülasyon</h1>
        <p class="coming-soon-subtitle">
            Bu simülasyon yakında aktif olacak. Detaylı içerik ve interaktif deneyim için geliştirme devam ediyor.
        </p>
        <div class="coming-soon-badge">Yakında Gelecek</div>
        <a href="/simulations.html" class="back-button">
            <i class="fas fa-arrow-left"></i> Simülasyonlara Dön
        </a>
    </div>
</body>
    <!-- Configuration & API Integration -->
    <script src="../config.js?v=1.0.2"></script>
    <script src="../js/api-integration.js?v=1.0.2"></script>
</html>
