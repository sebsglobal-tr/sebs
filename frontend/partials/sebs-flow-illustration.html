<div class="sebs-flow-diagram" role="img" aria-label="Öğrenci simülasyona girer, SEBS karar ve süreyi ölçer, gelişim raporu ve skor çıkar">
  <div class="sebs-flow-cards sebs-flow-cards--in" aria-hidden="true">
    <div class="sebs-flow-card sebs-flow-card--input">
      <div class="sebs-flow-avatar sebs-flow-avatar--a" aria-hidden="true">🎓</div>
      <span class="sebs-flow-score" style="font-size:0.65rem;font-weight:600;color:#64748b">Senaryo</span>
    </div>
  </div>

  <div class="sebs-flow-engine" aria-hidden="true">
    <div class="sebs-flow-engine__top"></div>
    <div class="sebs-flow-engine__body">
      <div class="sebs-flow-engine__logo">
        <img src="/images/sebs-navbar-mark.png?v=1" alt="" width="28" height="28" decoding="async" />
        <span>SEBS</span>
      </div>
      <p class="sebs-flow-engine__tag">Simülasyon · Karar · Rapor</p>
      <div class="sebs-flow-engine__pulse"><span></span></div>
    </div>
  </div>

  <div class="sebs-flow-cards sebs-flow-cards--out" aria-hidden="true">
    <div class="sebs-flow-card sebs-flow-card--out-1">
      <span class="sebs-flow-badge sebs-flow-badge--pass" title="Güçlü performans" aria-hidden="true">✓</span>
      <div class="sebs-flow-avatar sebs-flow-avatar--b" aria-hidden="true">🛡️</div>
      <span class="sebs-flow-score">78/100</span>
    </div>
    <div class="sebs-flow-card sebs-flow-card--out-2">
      <span class="sebs-flow-badge sebs-flow-badge--warn" title="Gelişim alanı var" aria-hidden="true">↑</span>
      <div class="sebs-flow-avatar sebs-flow-avatar--c" aria-hidden="true">💻</div>
      <span class="sebs-flow-score">42/100</span>
    </div>
  </div>
</div>
<p class="sebs-flow-caption">Eğitimde öğren, simülasyonda uygula — SEBS kararlarını ve gelişimini ölçülebilir skorlarla gösterir.</p>
