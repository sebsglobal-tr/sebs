<svg xmlns="http://www.w3.org/2000/svg" width="520" height="200" viewBox="0 0 520 200">
  <defs>
    <linearGradient id="dd-bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/></linearGradient>
  </defs>
  <rect width="520" height="200" fill="url(#dd-bg)"/>
  <text x="260" y="24" fill="#e2e8f0" font-family="sans-serif" font-size="14" font-weight="600" text-anchor="middle">DNS ve DHCP — Isim Cozumleme ve IP Atama</text>
  <!-- DNS -->
  <rect x="24" y="48" width="230" height="88" rx="10" fill="rgba(59,130,246,0.25)" stroke="#60a5fa"/>
  <text x="139" y="74" fill="#93c5fd" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle">DNS — Isim → IP</text>
  <text x="139" y="92" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">example.com → 93.184.216.34</text>
  <text x="139" y="108" fill="#64748b" font-family="sans-serif" font-size="9" text-anchor="middle">A, AAAA, CNAME, MX kayitlari</text>
  <text x="139" y="124" fill="#64748b" font-family="sans-serif" font-size="9" text-anchor="middle">nslookup, dig ile test</text>
  <!-- DHCP DORA -->
  <rect x="270" y="48" width="230" height="88" rx="10" fill="rgba(34,197,94,0.25)" stroke="#4ade80"/>
  <text x="385" y="74" fill="#86efac" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle">DHCP — DORA</text>
  <text x="385" y="92" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Discover → Offer → Request → Ack</text>
  <text x="385" y="108" fill="#64748b" font-family="sans-serif" font-size="9" text-anchor="middle">IP + Gateway + DNS atanir</text>
  <text x="385" y="124" fill="#64748b" font-family="sans-serif" font-size="9" text-anchor="middle">169.254.x.x = IP alinamadi</text>
  <text x="260" y="178" fill="#64748b" font-family="sans-serif" font-size="10" text-anchor="middle">“Site acilmiyor” → DNS; “IP yok / 169.254” → DHCP veya baglanti</text>
</svg>
