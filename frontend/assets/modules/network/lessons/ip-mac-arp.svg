<svg xmlns="http://www.w3.org/2000/svg" width="500" height="220" viewBox="0 0 500 220">
  <defs>
    <linearGradient id="ima-bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/></linearGradient>
  </defs>
  <rect width="500" height="220" fill="url(#ima-bg)"/>
  <text x="250" y="24" fill="#e2e8f0" font-family="sans-serif" font-size="14" font-weight="600" text-anchor="middle">IP vs MAC — ARP Iliskisi</text>
  <!-- IP: L3, logical -->
  <rect x="40" y="52" width="200" height="72" rx="10" fill="rgba(59,130,246,0.25)" stroke="#60a5fa"/>
  <text x="140" y="78" fill="#93c5fd" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle">IP Adresi (L3)</text>
  <text x="140" y="96" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Mantiksal, yonlendirme, degisebilir</text>
  <text x="140" y="114" fill="#64748b" font-family="sans-serif" font-size="9" text-anchor="middle">Or: 192.168.1.10</text>
  <!-- MAC: L2, physical -->
  <rect x="260" y="52" width="200" height="72" rx="10" fill="rgba(99,102,241,0.25)" stroke="#818cf8"/>
  <text x="360" y="78" fill="#c4b5fd" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle">MAC Adresi (L2)</text>
  <text x="360" y="96" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Fiziksel arayuz, yerel segment</text>
  <text x="360" y="114" fill="#64748b" font-family="sans-serif" font-size="9" text-anchor="middle">Or: AA:BB:CC:DD:EE:FF</text>
  <!-- ARP flow -->
  <rect x="80" y="148" width="340" height="56" rx="8" fill="rgba(212,168,83,0.15)" stroke="#d4a853"/>
  <text x="250" y="170" fill="#fcd34d" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle">ARP: “Bu IP’nin MAC’i kim?” → Request (broadcast) → Reply → Cache</text>
  <text x="250" y="188" fill="#94a3b8" font-family="sans-serif" font-size="9" text-anchor="middle">Ayni subnet icinde iletişim icin IP → MAC eslemesi gerekir</text>
</svg>
