<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300" role="img" aria-label="Temel Kriptografi">
  <defs>
    <linearGradient id="kr-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="45%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="kr-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4a853"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="kr-lock" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="kr-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="kr-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="rgba(148,163,184,0.08)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="300" fill="url(#kr-bg)"/>
  <rect width="800" height="300" fill="url(#kr-grid)"/>
  <!-- subtle cipher band -->
  <text x="40" y="42" fill="rgba(148,163,184,0.35)" font-family="ui-monospace, monospace" font-size="11" letter-spacing="2">4A 7F 2C 9E · E8 B1 0D · FF 3A</text>
  <text x="520" y="268" fill="rgba(148,163,184,0.28)" font-family="ui-monospace, monospace" font-size="10" letter-spacing="1.5">AES · RSA · SHA-256 · TLS</text>
  <!-- orbit ring -->
  <circle cx="400" cy="128" r="72" fill="none" stroke="rgba(56,189,248,0.2)" stroke-width="1" stroke-dasharray="6 8"/>
  <circle cx="400" cy="128" r="52" fill="none" stroke="rgba(212,168,83,0.25)" stroke-width="1"/>
  <!-- lock body -->
  <g filter="url(#kr-glow)" transform="translate(400,128)">
    <rect x="-38" y="-8" width="76" height="58" rx="10" fill="url(#kr-lock)" opacity="0.95"/>
    <path d="M-22 -8 V-28 a22 22 0 0 1 44 0 V-8" fill="none" stroke="url(#kr-gold)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="0" cy="22" r="6" fill="#0f172a" opacity="0.5"/>
    <rect x="-4" y="22" width="8" height="14" rx="2" fill="#0f172a" opacity="0.45"/>
  </g>
  <!-- key (right) -->
  <g transform="translate(548,118) rotate(35)">
    <circle cx="0" cy="0" r="14" fill="none" stroke="url(#kr-gold)" stroke-width="2.5"/>
    <rect x="12" y="-3" width="36" height="6" rx="3" fill="url(#kr-gold)" opacity="0.9"/>
    <rect x="40" y="-8" width="5" height="5" rx="1" fill="#fbbf24"/>
    <rect x="40" y="3" width="5" height="5" rx="1" fill="#fbbf24"/>
  </g>
  <!-- shield (left) -->
  <path d="M252 98 L252 128 c0 22 18 38 40 44 22-6 40-22 40-44 V98 l-40-18z" fill="none" stroke="rgba(56,189,248,0.55)" stroke-width="2"/>
  <path d="M272 118 l12 12 24-28" fill="none" stroke="#d4a853" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- data blocks -->
  <rect x="168" y="168" width="44" height="28" rx="6" fill="rgba(99,102,241,0.25)" stroke="rgba(129,140,248,0.4)" stroke-width="1"/>
  <rect x="588" y="168" width="44" height="28" rx="6" fill="rgba(14,165,233,0.2)" stroke="rgba(56,189,248,0.35)" stroke-width="1"/>
  <text x="400" y="248" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="22" font-weight="700" text-anchor="middle" letter-spacing="0.04em">Temel Kriptografi</text>
  <text x="400" y="272" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">Gizlilik · Bütünlük · Kimlik Dorulama</text>
</svg>
