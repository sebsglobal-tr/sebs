<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
  <script src="/js/gtag.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <base href="/">
  <title>Detaylı Değerlendirme Raporu - SEBS Global</title>
  <meta name="description" content="Quiz, simülasyon ve yapay zeka destekli kişisel öğrenme değerlendirme raporunuz.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/images/SEBS.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/saas-landing.css" />
  <link rel="stylesheet" href="/css/landing-chrome.css?v=9" />
  <link rel="stylesheet" href="/css/sebs-premium-theme.css?v=3" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/degerlendirme-raporu.css?v=6" />
</head>
<body class="sebs-premium-site landing-site-body font-sans text-slate-800 antialiased bg-slate-50">
<header class="sebs-header" id="sebsHeader">
  <div class="sebs-header__inner">
    <!-- Logo section (always left) -->
    <a href="/" class="sebs-header__logo">
      <img src="/images/sebs-navbar-mark.png?v=1" alt="" width="36" height="36" class="sebs-header__logo-img" />
      <span class="sebs-header__logo-text">
        <span class="sebs-header__wordmark">SEBS</span>
        <span class="sebs-header__wordmark-sub">GLOBAL</span>
      </span>
    </a>

    <!-- Desktop navigation (populated by navigation.js) -->
    <nav class="sebs-header__nav" id="sebsHeaderNav" aria-label="Ana menü"></nav>

    <!-- Right section: login/signup buttons + user menu + hamburger -->
    <div class="sebs-header__right">
      <!-- Guest: login link -->
      <a href="/login.html" id="loginBtn" class="sebs-header__login">Giriş</a>
      <!-- Guest: signup CTA -->
      <a href="/signup.html" id="signupBtn" class="sebs-header__signup">Ücretsiz başla</a>
      <!-- Authenticated: user pill -->
      <div id="userProfile" class="sebs-header__user" hidden>
        <button type="button" id="userProfileTrigger" class="sebs-header__user-trigger" aria-expanded="false" aria-haspopup="menu" aria-controls="userAccountPanel" aria-label="Hesap menüsü">
          <span id="userAvatar" class="sebs-header__user-avatar">K</span>
          <span id="userName" class="sebs-header__user-name">Kullanıcı</span>
          <svg class="sebs-header__user-chevron" width="10" height="6" viewBox="0 0 10 6" fill="none" aria-hidden="true"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <!-- User dropdown -->
        <div id="userAccountPanel" class="sebs-header__dropdown" role="menu" hidden>
          <a href="/dashboard.html" class="sebs-header__dropdown-item" role="menuitem">Profilim</a>
          <div class="sebs-header__dropdown-divider" role="none"></div>
          <div class="sebs-header__dropdown-row" role="none">
            <span class="sebs-header__dropdown-label">Gece modu</span>
            <div id="userMenuThemeMount" class="sebs-header__dropdown-theme-mount"></div>
          </div>
          <div class="sebs-header__dropdown-divider" role="none"></div>
          <button type="button" id="logoutBtn" class="sebs-header__dropdown-item" role="menuitem" hidden>Çıkış yap</button>
        </div>
      </div>
      <!-- Hamburger (visible < 1024px) -->
      <button type="button" class="sebs-header__hamburger" id="sebsHamburger" aria-label="Menü" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>

<!-- Mobile drawer (populated by navigation.js) -->
<div id="sebsMobileDrawer" class="sebs-drawer" aria-hidden="true">
  <div class="sebs-drawer__overlay"></div>
  <div class="sebs-drawer__panel">
    <div class="sebs-drawer__header">
      <span class="sebs-drawer__title">Menü</span>
      <button type="button" class="sebs-drawer__close" id="sebsDrawerClose" aria-label="Menüyü kapat">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M4 4l10 10M14 4L4 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
    </div>
    <nav class="sebs-drawer__nav" id="sebsDrawerNav"></nav>
  </div>
</div>


<main class="mx-auto max-w-5xl px-4 pb-16 pt-24 sm:px-6 print:pt-4">
  <div id="reportLoading" class="rounded-2xl border border-slate-200 bg-white p-12 text-center shadow-card">
    <i class="fas fa-spinner fa-spin text-3xl text-blue-600"></i>
    <p class="mt-4 text-slate-600">Detaylı raporunuz hazırlanıyor…</p>
    <p class="mt-2 text-sm text-slate-500">Modül, quiz ve simülasyon verileri analiz ediliyor.</p>
  </div>
  <div id="reportError" class="hidden rounded-xl border border-rose-200 bg-rose-50 p-6 text-rose-800"></div>
  <div id="reportRoot" class="report-root hidden space-y-6"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
<script src="/js/api-base.js"></script>
<script src="/js/supabase-env.js"></script>
<script src="/js/supabase-client.js"></script>
<script src="/js/supabase-auth.js?v=2.1"></script>
  <script src="/js/degerlendirme-raporu.js?v=6"></script>
</body>
</html>
