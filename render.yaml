# Render Blueprint — monorepo (repo kökü)
# Dashboard: New → Blueprint → Bu dosyayı bağlayın
# Gizli değişkenleri (DATABASE_URL, JWT_SECRET, …) panelden ekleyin (sync: false)
#
# ÖNEMLİ: Start "node backend/server.js" ise bağımlılıklar backend/ altında kurulmalı:
#   buildCommand: npm ci --prefix backend
# Render’da Root Directory boş bırakın (repo kökü). Root Directory = backend kullanıyorsanız
# Start Command mutlaka "node server.js" olsun (node backend/server.js değil).

services:
  - type: web
    name: sebs-staging
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm ci --prefix backend
    startCommand: node backend/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_TLS_REJECT_UNAUTHORIZED
        value: "0"
      # Aşağıdakileri Render panelinde Secret olarak girin:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: PUBLIC_SITE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      # Reverse proxy arkasında doğru IP / rate limit için (çoğu barındırıcıda önerilir)
      - key: TRUST_PROXY
        value: "1"
