  <text x="206" y="108" fill="#c4b5fd" font-family="sans-serif" font-size="10" text-anchor="middle">VLAN 10</text>
  <rect x="248" y="86" width="52" height="36" rx="6" fill="rgba(34,197,94,0.3)" stroke="#4ade80"/>
  <text x="274" y="108" fill="#86efac" font-family="sans-serif" font-size="10" text-anchor="middle">VLAN 20</text>
  <rect x="32" y="48" width="100" height="88" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)"/>
  <text x="82" y="72" fill="#94a3b8" font-family="sans-serif" font-size="10" font-weight="600" text-anchor="middle">Access</text>
  <text x="82" y="90" fill="#64748b" font-family="sans-serif" font-size="9" text-anchor="middle">Tek VLAN</text>
  <text x="82" y="108" fill="#64748b" font-family="sans-serif" font-size="9" text-anchor="middle">PC, yazici</text>
  <line x1="132" y1="92" x2="160" y2="92" stroke="#d4a853" stroke-width="1.5" stroke-dasharray="3 2"/>
  <rect x="348" y="48" width="100" height="88" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)"/>
  <text x="398" y="72" fill="#94a3b8" font-family="sans-serif" font-size="10" font-weight="600" text-anchor="middle">Trunk</text>
  <text x="398" y="90" fill="#64748b" font-family="sans-serif" font-size="9" text-anchor="middle">Tagged, cok VLAN</text>
  <text x="398" y="108" fill="#64748b" font-family="sans-serif" font-size="9" text-anchor="middle">switch-switch</text>
  <line x1="348" y1="92" x2="320" y2="92" stroke="#d4a853" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="240" y="168" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Access: tek VLAN; Trunk: switch arasi cok VLAN</text>
  <text x="240" y="188" fill="#64748b" font-family="sans-serif" font-size="9" text-anchor="middle">VLAN ID = mantiksal bolumleme, broadcast domain ayirma</text>
