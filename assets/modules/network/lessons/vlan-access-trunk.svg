<svg xmlns="http://www.w3.org/2000/svg" width="480" height="200" viewBox="0 0 480 200">
  <defs>
    <linearGradient id="va-bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/></linearGradient>
  </defs>
  <rect width="480" height="200" fill="url(#va-bg)"/>
  <text x="240" y="24" fill="#e2e8f0" font-family="sans-serif" font-size="14" font-weight="600" text-anchor="middle">VLAN — Access vs Trunk</text>
  <rect x="160" y="52" width="160" height="80" rx="10" fill="rgba(59,130,246,0.2)" stroke="#60a5fa"/>
  <text x="240" y="76" fill="#93c5fd" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle">Switch</text>
