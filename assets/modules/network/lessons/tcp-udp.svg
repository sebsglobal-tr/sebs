<svg xmlns="http://www.w3.org/2000/svg" width="500" height="220" viewBox="0 0 500 220">
  <defs>
    <linearGradient id="tu-bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/></linearGradient>
  </defs>
  <rect width="500" height="220" fill="url(#tu-bg)"/>
  <text x="250" y="24" fill="#e2e8f0" font-family="sans-serif" font-size="14" font-weight="600" text-anchor="middle">TCP vs UDP — L4 Secim</text>
  <!-- TCP -->
  <rect x="40" y="48" width="200" height="100" rx="10" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="140" y="76" fill="#93c5fd" font-family="sans-serif" font-size="12" font-weight="600" text-anchor="middle">TCP</text>
  <text x="140" y="96" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Guvenilir, siralama,</text>
  <text x="140" y="112" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">teslimat onayı</text>
  <text x="140" y="132" fill="#64748b" font-family="sans-serif" font-size="9" text-anchor="middle">Web (HTTP/HTTPS), e-posta</text>
  <text x="140" y="138" fill="#64748b" font-family="sans-serif" font-size="9" text-anchor="middle">Dosya aktarimi</text>
  <!-- UDP -->
  <rect x="260" y="48" width="200" height="100" rx="10" fill="rgba(212,168,83,0.25)" stroke="#d4a853"/>
  <text x="360" y="76" fill="#fcd34d" font-family="sans-serif" font-size="12" font-weight="600" text-anchor="middle">UDP</text>
  <text x="360" y="96" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Hizli, basit,</text>
  <text x="360" y="112" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">teslimat garantisi yok</text>
  <text x="360" y="132" fill="#64748b" font-family="sans-serif" font-size="9" text-anchor="middle">Video stream, VoIP, DNS</text>
  <text x="360" y="138" fill="#64748b" font-family="sans-serif" font-size="9" text-anchor="middle">Oyun (gecikme kritik)</text>
  <!-- Port -->
  <rect x="120" y="168" width="260" height="38" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
  <text x="250" y="192" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Port: Uygulama kanali (80 HTTP, 443 HTTPS, 53 DNS, 67/68 DHCP…)</text>
</svg>
