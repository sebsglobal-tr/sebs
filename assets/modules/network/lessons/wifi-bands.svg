<svg xmlns="http://www.w3.org/2000/svg" width="500" height="220" viewBox="0 0 500 220">
  <defs>
    <linearGradient id="wb-bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/></linearGradient>
  </defs>
  <rect width="500" height="220" fill="url(#wb-bg)"/>
  <text x="250" y="24" fill="#e2e8f0" font-family="sans-serif" font-size="14" font-weight="600" text-anchor="middle">Wi-Fi Bantlari — 2.4 / 5 / 6 GHz</text>
  <!-- 2.4 GHz -->
  <rect x="32" y="48" width="132" height="100" rx="10" fill="rgba(99,102,241,0.25)" stroke="#818cf8"/>
  <text x="98" y="72" fill="#c4b5fd" font-family="sans-serif" font-size="12" font-weight="600" text-anchor="middle">2.4 GHz</text>
  <text x="98" y="90" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Daha iyi kapsama</text>
  <text x="98" y="106" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Kanal kalabalik</text>
  <text x="98" y="132" fill="#64748b" font-family="sans-serif" font-size="9" text-anchor="middle">Ev/IoT, az kanal</text>
  <!-- 5 GHz -->
  <rect x="184" y="42" width="132" height="112" rx="10" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="250" y="66" fill="#93c5fd" font-family="sans-serif" font-size="12" font-weight="600" text-anchor="middle">5 GHz</text>
  <text x="250" y="84" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Daha hizli, daha az</text>
  <text x="250" y="98" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">parazit</text>
  <text x="250" y="122" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Cok kanal</text>
  <text x="250" y="142" fill="#64748b" font-family="sans-serif" font-size="9" text-anchor="middle">Video, oyun</text>
  <!-- 6 GHz (Wi-Fi 6E/7) -->
  <rect x="336" y="48" width="132" height="100" rx="10" fill="rgba(212,168,83,0.25)" stroke="#d4a853"/>
  <text x="402" y="72" fill="#fcd34d" font-family="sans-serif" font-size="12" font-weight="600" text-anchor="middle">6 GHz</text>
  <text x="402" y="90" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Wi-Fi 6E/7</text>
  <text x="402" y="106" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Genis kanal</text>
  <text x="402" y="132" fill="#64748b" font-family="sans-serif" font-size="9" text-anchor="middle">Cihaz destegi gerekir</text>
  <text x="250" y="198" fill="#64748b" font-family="sans-serif" font-size="10" text-anchor="middle">Hangi banda bagli? → performans ve kanal kalabaligi teşhisi</text>
</svg>
