  <text x="120" y="102" fill="#93c5fd" font-family="sans-serif" font-size="10" text-anchor="middle">6</text>
  <text x="240" y="248" fill="#94a3b8" font-family="sans-serif" font-size="11" text-anchor="middle">Veri halka uzerinde dolasir; tek kopma (yedeksiz) donguyu bozabilir</text>
