  <rect x="358" y="162" width="44" height="36" rx="6" fill="rgba(34,197,94,0.25)" stroke="#4ade80"/>
  <text x="380" y="182" fill="#86efac" font-family="sans-serif" font-size="10" text-anchor="middle">3</text>
