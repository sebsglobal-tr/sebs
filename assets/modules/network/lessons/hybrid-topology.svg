<svg xmlns="http://www.w3.org/2000/svg" width="520" height="260" viewBox="0 0 520 260">
  <defs>
    <linearGradient id="hyb-bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/></linearGradient>
  </defs>
  <rect width="520" height="260" fill="url(#hyb-bg)"/>
  <text x="260" y="24" fill="#e2e8f0" font-family="sans-serif" font-size="14" font-weight="600" text-anchor="middle">Hybrid (Melez) Topoloji — Gercek dunya</text>
  <!-- Backbone (ring or bus style) -->
  <path d="M80 130 L260 50 L440 130 L260 210 Z" fill="none" stroke="#d4a853" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="260" y="132" fill="#94a3b8" font-family="sans-serif" font-size="9" text-anchor="middle">Omurga (ornek: halka)</text>
  <!-- Star 1 - Kat 1 -->
  <circle cx="120" cy="100" r="28" fill="rgba(59,130,246,0.2)" stroke="#60a5fa"/>
  <text x="120" y="98" fill="#93c5fd" font-family="sans-serif" font-size="9" font-weight="600" text-anchor="middle">SW</text>
  <text x="120" y="108" fill="#64748b" font-family="sans-serif" font-size="8" text-anchor="middle">Kat 1</text>
  <line x1="100" y1="88" x2="80" y2="115" stroke="#60a5fa" stroke-width="1"/>
  <line x1="140" y1="88" x2="160" y2="115" stroke="#60a5fa" stroke-width="1"/>
  <!-- Star 2 - Kat 2 -->
  <circle cx="400" cy="100" r="28" fill="rgba(34,197,94,0.2)" stroke="#4ade80"/>
  <text x="400" y="98" fill="#86efac" font-family="sans-serif" font-size="9" font-weight="600" text-anchor="middle">SW</text>
  <text x="400" y="108" fill="#64748b" font-family="sans-serif" font-size="8" text-anchor="middle">Kat 2</text>
  <line x1="380" y1="88" x2="360" y2="115" stroke="#4ade80" stroke-width="1"/>
  <line x1="420" y1="88" x2="440" y2="115" stroke="#4ade80" stroke-width="1"/>
  <!-- Star 3 - Kat 3 -->
  <circle cx="260" cy="200" r="28" fill="rgba(99,102,241,0.2)" stroke="#818cf8"/>
  <text x="260" y="198" fill="#c4b5fd" font-family="sans-serif" font-size="9" font-weight="600" text-anchor="middle">SW</text>
  <text x="260" y="208" fill="#64748b" font-family="sans-serif" font-size="8" text-anchor="middle">Kat 3</text>
  <line x1="240" y1="188" x2="225" y2="178" stroke="#818cf8" stroke-width="1"/>
  <line x1="280" y1="188" x2="295" y2="178" stroke="#818cf8" stroke-width="1"/>
  <text x="260" y="242" fill="#94a3b8" font-family="sans-serif" font-size="11" text-anchor="middle">Katlar yildiz; katlar arasi omurga (ring/bus) — sorun nerede basliyor, nerede bitiyor?</text>
</svg>
