<svg xmlns="http://www.w3.org/2000/svg" width="560" height="220" viewBox="0 0 560 220">
  <defs>
    <linearGradient id="sf-bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/></linearGradient>
    <linearGradient id="sf-gw" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#1e40af"/><stop offset="100%" style="stop-color:#3b82f6"/></linearGradient>
  </defs>
  <rect width="560" height="220" fill="url(#sf-bg)"/>
  <text x="280" y="24" fill="#e2e8f0" font-family="sans-serif" font-size="14" font-weight="600" text-anchor="middle">SOHO Ag Akisi  Ev / Kucuk Ofis</text>
  <!-- ISP -->
  <rect x="20" y="52" width="80" height="44" rx="8" fill="rgba(100,116,139,0.4)" stroke="#94a3b8"/>
  <text x="60" y="78" fill="#cbd5e0" font-family="sans-serif" font-size="10" font-weight="600" text-anchor="middle">ISP</text>
  <text x="60" y="90" fill="#94a3b8" font-family="sans-serif" font-size="9" text-anchor="middle">Hatt</text>
  <!-- Modem/ONT -->
  <rect x="120" y="48" width="90" height="52" rx="8" fill="rgba(59,130,246,0.25)" stroke="#60a5fa"/>
  <text x="165" y="72" fill="#93c5fd" font-family="sans-serif" font-size="10" font-weight="600" text-anchor="middle">Modem</text>
  <text x="165" y="86" fill="#94a3b8" font-family="sans-serif" font-size="9" text-anchor="middle">/ ONT</text>
  <!-- Router/Gateway -->
  <rect x="230" y="42" width="100" height="64" rx="10" fill="url(#sf-gw)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="280" y="68" fill="#fff" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle">Router</text>
  <text x="280" y="84" fill="#93c5fd" font-family="sans-serif" font-size="9" text-anchor="middle">Gateway</text>
  <text x="280" y="98" fill="#93c5fd" font-family="sans-serif" font-size="9" text-anchor="middle">(Cikis kapisi)</text>
  <!-- Switch + AP -->
  <rect x="350" y="52" width="80" height="44" rx="8" fill="rgba(34,197,94,0.25)" stroke="#4ade80"/>
  <text x="390" y="74" fill="#86efac" font-family="sans-serif" font-size="10" font-weight="600" text-anchor="middle">Switch</text>
  <text x="390" y="88" fill="#94a3b8" font-family="sans-serif" font-size="9" text-anchor="middle">LAN</text>
  <rect x="450" y="52" width="80" height="44" rx="8" fill="rgba(212,168,83,0.25)" stroke="#d4a853"/>
  <text x="490" y="74" fill="#fcd34d" font-family="sans-serif" font-size="10" font-weight="600" text-anchor="middle">AP</text>
  <text x="490" y="88" fill="#94a3b8" font-family="sans-serif" font-size="9" text-anchor="middle">Wi-Fi</text>
  <!-- Arrows -->
  <path d="M100 74 L120 74" stroke="#d4a853" stroke-width="1.5" fill="none"/>
  <path d="M210 74 L230 74" stroke="#d4a853" stroke-width="1.5" fill="none"/>
  <path d="M330 74 L350 74" stroke="#d4a853" stroke-width="1.5" fill="none"/>
  <path d="M430 74 L450 74" stroke="#d4a853" stroke-width="1.5" fill="none"/>
  <!-- Clients -->
  <text x="280" y="138" fill="#94a3b8" font-family="sans-serif" font-size="10" text-anchor="middle">Istemciler: PC, telefon, tablet, TV, yazici</text>
  <rect x="180" y="152" width="120" height="52" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)"/>
  <text x="240" y="178" fill="#cbd5e0" font-family="sans-serif" font-size="10" text-anchor="middle">Wi-Fi bagli</text>
  <text x="240" y="192" fill="#94a3b8" font-family="sans-serif" font-size="9" text-anchor="middle">veya kablo</text>
  <rect x="320" y="152" width="120" height="52" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)"/>
  <text x="380" y="178" fill="#cbd5e0" font-family="sans-serif" font-size="10" text-anchor="middle">Tek kutu:</text>
  <text x="380" y="192" fill="#94a3b8" font-family="sans-serif" font-size="9" text-anchor="middle">Modem+Router+Switch+AP</text>
  <text x="280" y="212" fill="#64748b" font-family="sans-serif" font-size="10" text-anchor="middle">Sorun giderme: Hangi rol etkileniyor? (Gateway / Switch / AP)</text>
</svg>
