<svg xmlns="http://www.w3.org/2000/svg" width="480" height="260" viewBox="0 0 480 260">
  <defs>
    <linearGradient id="st-bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/></linearGradient>
    <linearGradient id="st-center" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#3b82f6"/><stop offset="100%" style="stop-color:#1e40af"/></linearGradient>
    <filter id="st-glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="480" height="260" fill="url(#st-bg)"/>
  <text x="240" y="26" fill="#e2e8f0" font-family="sans-serif" font-size="14" font-weight="600" text-anchor="middle">Yildiz Topolojisi (Star)  Modern LAN</text>
  <!-- Center: Switch -->
  <rect x="200" y="88" width="80" height="52" rx="10" fill="url(#st-center)" stroke="#60a5fa" stroke-width="1.5" filter="url(#st-glow)"/>
  <text x="240" y="115" fill="#fff" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle">Switch</text>
  <text x="240" y="130" fill="#93c5fd" font-family="sans-serif" font-size="9" text-anchor="middle">Merkez</text>
  <!-- Nodes -->
  <rect x="40" y="48" width="72" height="40" rx="8" fill="rgba(99,102,241,0.3)" stroke="#818cf8"/>
  <text x="76" y="73" fill="#c4b5fd" font-family="sans-serif" font-size="10" text-anchor="middle">PC 1</text>
  <rect x="368" y="48" width="72" height="40" rx="8" fill="rgba(99,102,241,0.3)" stroke="#818cf8"/>
  <text x="404" y="73" fill="#c4b5fd" font-family="sans-serif" font-size="10" text-anchor="middle">PC 2</text>
  <rect x="40" y="168" width="72" height="40" rx="8" fill="rgba(34,197,94,0.25)" stroke="#4ade80"/>
  <text x="76" y="193" fill="#86efac" font-family="sans-serif" font-size="10" text-anchor="middle">PC 3</text>
  <rect x="368" y="168" width="72" height="40" rx="8" fill="rgba(34,197,94,0.25)" stroke="#4ade80"/>
  <text x="404" y="193" fill="#86efac" font-family="sans-serif" font-size="10" text-anchor="middle">PC 4</text>
  <!-- Links to center -->
  <line x1="112" y1="68" x2="200" y2="114" stroke="#d4a853" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.9"/>
  <line x1="368" y1="68" x2="280" y2="114" stroke="#d4a853" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.9"/>
  <line x1="112" y1="188" x2="200" y2="140" stroke="#d4a853" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.9"/>
  <line x1="368" y1="188" x2="280" y2="140" stroke="#d4a853" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.9"/>
  <text x="240" y="242" fill="#94a3b8" font-family="sans-serif" font-size="11" text-anchor="middle">Tek kablo kopmasi = sadece o uc etkilenir; merkez arizasi = herkes</text>
</svg>
