<!DOCTYPE html>
<html lang="tr">
<head>
  <script src="/js/gtag.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="icon" type="image/png" href="/images/SEBS.png" />
  <meta name="theme-color" content="#061018" />
  <base href="/" />
  <title>BexaCmp — Kriptografik Dayanıklılık Kriz Masası | SEBS Global</title>
  <meta name="description" content="TLS, anahtar yönetimi ve post-kuantum geçiş kararları üzerinden kriptografik mimari denetim simülasyonu." />
  <meta name="robots" content="noindex, nofollow" />
  <script src="/utils/simulation-tracker.js"></script>
  <style>
    :root {
      --bg: #061018;
      --panel: #0c1828;
      --panel2: #112238;
      --line: rgba(120, 180, 220, 0.22);
      --text: #e8f4ff;
      --muted: #88a8c5;
      --dim: #5a7a96;
      --accent: #1bc5e8;
      --accent2: #2d7cff;
      --ok: #3dd68c;
      --warn: #ffb84d;
      --bad: #ff5c7a;
      --orange: #ff8c42;
      --shadow: 0 24px 56px rgba(0,0,0,.48);
      --taskbar-h: 44px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      overflow: hidden;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      color: var(--text);
      background: #030810;
      user-select: none;
    }
    button, input, select, textarea { font: inherit; }
    .mono { font-family: Consolas, "Cascadia Mono", "Courier New", monospace; }
    .hidden { display: none !important; }
    .small { font-size: 12px; }
    .muted { color: var(--muted); }

    .login {
      position: fixed; inset: 0; z-index: 2000;
      display: grid; place-items: center;
      background:
        radial-gradient(circle at 20% 25%, rgba(27,197,232,.2), transparent 28%),
        radial-gradient(circle at 80% 75%, rgba(45,124,255,.16), transparent 32%),
        linear-gradient(135deg, #040c16 0%, #0a1e35 55%, #030810 100%);
    }
    .login-card {
      width: min(440px, calc(100vw - 32px));
      padding: 32px;
      border: 1px solid rgba(160,220,255,.22);
      border-radius: 18px;
      background: rgba(8, 18, 32, .82);
      box-shadow: var(--shadow);
      text-align: center;
    }
    .logo {
      width: 76px; height: 76px; margin: 0 auto 14px;
      border-radius: 20px;
      display: grid; place-items: center;
      background: linear-gradient(135deg, #0a3d5c, #1bc5e8);
      font-weight: 900; font-size: 22px;
      box-shadow: 0 0 40px rgba(27,197,232,.3);
    }
    .login h1 { margin: 0 0 6px; font-size: 21px; }
    .login .sub { margin: 0 0 18px; color: var(--muted); font-size: 13px; line-height: 1.5; }
    .login-meta { text-align: left; font-size: 12px; color: var(--muted); margin-bottom: 16px; line-height: 1.7; }
    .login-field {
      width: 100%; border: 1px solid var(--line); border-radius: 10px;
      padding: 11px; color: var(--text); background: rgba(4,12,22,.8);
      margin-bottom: 12px; text-align: center;
    }
    .btn {
      border: 1px solid rgba(27,197,232,.4);
      color: #f8fdff;
      background: linear-gradient(135deg, #0a6a9a, #1bc5e8);
      border-radius: 9px;
      padding: 9px 14px;
      cursor: pointer;
      font-weight: 700;
    }
    .btn:hover { filter: brightness(1.08); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn.ghost { background: rgba(12,28,48,.75); border-color: var(--line); color: #b9d7ef; }
    .btn.sm { padding: 6px 10px; font-size: 12px; }
    .btn.block { width: 100%; text-align: left; margin-bottom: 6px; line-height: 1.35; }

    .desktop {
      position: fixed; inset: 0;
      background:
        linear-gradient(145deg, rgba(27,197,232,.06), transparent 36%),
        radial-gradient(circle at 72% 18%, rgba(45,124,255,.14), transparent 30%),
        linear-gradient(160deg, #061018 0%, #0c2238 50%, #050d16 100%);
    }
    .brand-watermark {
      position: absolute; left: 24px; bottom: calc(var(--taskbar-h) + 20px);
      font-size: 28px; font-weight: 800; letter-spacing: .08em;
      color: rgba(255,255,255,.04); pointer-events: none;
    }
    .icons {
      position: absolute; inset: 12px 12px calc(var(--taskbar-h) + 12px);
      display: flex; flex-wrap: wrap; align-content: flex-start; gap: 4px 8px;
      align-items: flex-start;
    }
    .icon {
      width: 88px; padding: 8px 6px; border-radius: 8px;
      text-align: center; cursor: default;
    }
    .icon:hover { background: rgba(255,255,255,.06); }
    .icon.selected { background: rgba(27,197,232,.18); outline: 1px solid rgba(27,197,232,.35); }
    .icon-glyph { font-size: 28px; line-height: 1; margin-bottom: 4px; }
    .icon-label { font-size: 11px; color: #d4e8ff; line-height: 1.25; word-break: break-word; }

    .taskbar {
      position: absolute; left: 0; right: 0; bottom: 0; height: var(--taskbar-h);
      display: flex; align-items: center; gap: 6px; padding: 0 8px;
      background: rgba(6,14,24,.94); border-top: 1px solid var(--line);
      z-index: 50;
    }
    .start-btn, .show-btn {
      width: 36px; height: 32px; border-radius: 6px; border: 1px solid var(--line);
      background: rgba(12,28,48,.9); color: var(--accent); cursor: pointer; font-weight: 800;
    }
    .task-buttons { flex: 1; display: flex; gap: 4px; overflow-x: auto; min-width: 0; }
    .task-btn {
      max-width: 160px; padding: 6px 10px; border-radius: 6px; border: 1px solid transparent;
      background: rgba(255,255,255,.04); color: #c8dff5; font-size: 11px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;
    }
    .task-btn.active { border-color: rgba(27,197,232,.45); background: rgba(27,197,232,.12); }
    .clock { font-size: 12px; color: var(--muted); padding: 0 8px; white-space: nowrap; }

    .start-menu {
      position: absolute; left: 8px; bottom: calc(var(--taskbar-h) + 4px); z-index: 60;
      min-width: 220px; padding: 6px; border: 1px solid var(--line); border-radius: 10px;
      background: rgba(8,18,32,.98); box-shadow: var(--shadow);
    }
    .start-menu button {
      display: block; width: 100%; border: 0; border-radius: 7px;
      background: transparent; color: #dcefff; text-align: left;
      padding: 8px 10px; cursor: pointer; font-size: 12px;
    }
    .start-menu button:hover { background: rgba(27,197,232,.1); }

    .win {
      position: absolute; border: 1px solid var(--line); border-radius: 10px;
      background: #0a1624; box-shadow: var(--shadow); display: flex; flex-direction: column;
      min-width: 320px; min-height: 200px; overflow: hidden;
    }
    .win.maximized { left: 8px !important; top: 8px !important; width: calc(100% - 16px) !important; height: calc(100% - var(--taskbar-h) - 16px) !important; }
    .win-title {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      background: linear-gradient(180deg, #122a42, #0e2034);
      border-bottom: 1px solid var(--line); cursor: move; flex-shrink: 0;
    }
    .win-title span { flex: 1; font-size: 12px; font-weight: 700; }
    .win-ctrl { width: 28px; height: 24px; border: 0; border-radius: 5px;
      background: rgba(255,255,255,.06); color: #c8dff5; cursor: pointer; font-size: 12px;
    }
    .win-ctrl:hover { background: rgba(255,255,255,.12); }
    .win-ctrl.close:hover { background: var(--bad); color: #fff; }
    .win-body { flex: 1; overflow: auto; padding: 12px; font-size: 13px; line-height: 1.5; }

    .context-menu {
      position: absolute; z-index: 220; min-width: 180px; padding: 5px;
      border: 1px solid var(--line); border-radius: 10px;
      background: rgba(8,18,32,.98); box-shadow: var(--shadow);
    }
    .context-menu button {
      display: block; width: 100%; border: 0; border-radius: 6px;
      background: transparent; color: #dcefff; text-align: left;
      padding: 7px 9px; cursor: pointer; font-size: 12px;
    }
    .context-menu button:hover { background: rgba(27,197,232,.1); }

    .modal-back {
      position: fixed; inset: 0; z-index: 300; display: grid; place-items: center;
      background: rgba(0,5,12,.55);
    }
    .modal {
      width: min(480px, calc(100vw - 32px)); padding: 18px;
      border: 1px solid var(--line); border-radius: 14px;
      background: #0a1624; box-shadow: var(--shadow);
    }
    .modal h2 { margin: 0 0 10px; font-size: 17px; }
    .modal dl { margin: 0; font-size: 12px; line-height: 1.7; }
    .modal dt { color: var(--dim); display: inline; }
    .modal dd { display: inline; margin: 0 0 0 4px; color: var(--text); }

    .toast-wrap {
      position: fixed; right: 16px; bottom: calc(var(--taskbar-h) + 12px); z-index: 400;
      display: grid; gap: 8px; width: min(360px, calc(100vw - 32px));
    }
    .toast {
      border: 1px solid var(--line); border-left: 4px solid var(--accent);
      border-radius: 10px; padding: 10px 12px;
      background: rgba(8,18,32,.96); font-size: 12px; line-height: 1.4;
      animation: toastIn .3s ease;
    }
    .toast.ok { border-left-color: var(--ok); }
    .toast.bad { border-left-color: var(--bad); }
    .toast.warn { border-left-color: var(--warn); }
    @keyframes toastIn { from { opacity: 0; transform: translateX(12px); } to { opacity: 1; transform: none; } }

    .sim-chrono {
      position: fixed; top: 12px; right: 14px; z-index: 345;
      padding: 6px 11px; border-radius: 8px;
      border: 1px solid rgba(27,197,232,.35);
      background: rgba(8, 18, 32, .92);
      font-family: Consolas, "Cascadia Mono", monospace;
      font-size: 13px; font-weight: 700; letter-spacing: .06em;
      color: var(--accent); pointer-events: none;
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
    }
    .sim-chrono-label {
      display: block; font-size: 9px; font-weight: 600; letter-spacing: .12em;
      color: var(--dim); text-transform: uppercase; margin-bottom: 2px;
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    .msg-notify-wrap {
      position: fixed; right: 16px; top: 52px; z-index: 350;
    }
    .msg-notify {
      display: flex; gap: 10px; align-items: center; padding: 12px 14px;
      border: 1px solid rgba(27,197,232,.4); border-radius: 12px;
      background: rgba(10,24,40,.96); cursor: pointer; max-width: 320px;
      box-shadow: var(--shadow);
    }
    .msg-notify-ico { font-size: 24px; }
    .msg-notify-ozge { border-color: rgba(255, 184, 77, .45); }
    .msg-notify-ozge:hover { border-color: rgba(255, 184, 77, .7); }

    /* BexaChat */
    .chat-thread { display: flex; flex-direction: column; gap: 10px; }
    .chat-bubble {
      max-width: 92%; padding: 10px 12px; border-radius: 12px;
      font-size: 13px; line-height: 1.5;
    }
    .chat-bubble.metehan {
      align-self: flex-start; background: rgba(45,124,255,.15);
      border: 1px solid rgba(45,124,255,.35); border-radius: 4px 12px 12px 12px;
    }
    .chat-bubble.metehan.ok { border-color: rgba(61,214,140,.55); background: rgba(61,214,140,.1); }
    .chat-bubble.metehan.warn { border-color: rgba(255,184,77,.55); background: rgba(255,184,77,.1); }
    .chat-bubble.metehan.bad { border-color: rgba(255,92,122,.55); background: rgba(255,92,122,.1); }
    .chat-bubble.user {
      align-self: flex-end; background: rgba(27,197,232,.12);
      border: 1px solid rgba(27,197,232,.3); border-radius: 12px 4px 12px 12px;
    }
    .chat-sender { font-size: 10px; font-weight: 700; color: var(--dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .06em; }
    .chat-choices { display: grid; gap: 6px; margin-top: 8px; }
    .chat-tabs {
      display: flex; border: 1px solid var(--line); border-radius: 10px;
      overflow: hidden; margin-bottom: 10px; flex-shrink: 0;
    }
    .chat-tab {
      flex: 1; display: flex; flex-direction: column; align-items: flex-start; gap: 1px;
      padding: 8px 10px; border: 0; background: rgba(4,12,22,.5);
      color: var(--muted); cursor: pointer; text-align: left;
    }
    .chat-tab + .chat-tab { border-left: 1px solid var(--line); }
    .chat-tab.active { background: rgba(27,197,232,.1); color: var(--text); }
    .chat-tab-name { font-weight: 700; font-size: 12px; line-height: 1.2; }
    .chat-tab-sub { font-size: 9px; color: var(--dim); letter-spacing: .04em; }
    .chat-tab-preview { font-size: 10px; color: var(--dim); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    .chat-bubble.ozge {
      align-self: flex-start; background: rgba(255, 184, 77, .12);
      border: 1px solid rgba(255, 184, 77, .35); border-radius: 4px 12px 12px 12px;
    }
    #body-bexachat { display: flex; flex-direction: column; min-height: 0; }
    #body-bexachat .chat-layout { display: flex; flex-direction: column; flex: 1; min-height: 0; }
    #body-bexachat .chat-thread { flex: 1; overflow-y: auto; min-height: 0; }
    .chat-footer {
      flex-shrink: 0; padding-top: 10px; margin-top: 4px;
      border-top: 1px solid var(--line);
    }
    .chat-hint-btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 12px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600;
      border: 1px solid rgba(255, 184, 77, .45);
      background: linear-gradient(180deg, rgba(255, 184, 77, .16), rgba(255, 184, 77, .06));
      color: #ffc966;
    }
    .chat-hint-btn:hover { background: rgba(255, 184, 77, .22); }
    .chat-hint-btn .hint-bulb { font-size: 18px; line-height: 1; filter: drop-shadow(0 0 6px rgba(255, 200, 80, .35)); }
    .hint-modal .hint-warn { color: var(--warn); font-size: 13px; line-height: 1.65; margin: 0; }
    .hint-modal .hint-body {
      margin: 12px 0 0; padding: 12px; border-radius: 8px;
      background: rgba(4, 12, 22, .6); border: 1px solid var(--line);
      font-size: 13px; line-height: 1.6; white-space: pre-wrap;
    }

    /* CRC */
    .crc { display: grid; grid-template-rows: auto 1fr auto; height: 100%; min-height: 420px; margin: -12px; }
    .crc-top {
      padding: 10px 14px; border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(27,197,232,.08), transparent);
    }
    .crc-top h2 { margin: 0; font-size: 15px; }
    .crc-top .meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .crc-main { display: grid; grid-template-columns: 168px 1fr 240px; min-height: 0; flex: 1; }
    @media (max-width: 900px) { .crc-main { grid-template-columns: 1fr; } }
    .crc-nav {
      border-right: 1px solid var(--line); padding: 8px; overflow-y: auto;
      background: rgba(4,10,18,.5);
    }
    .crc-nav button {
      display: block; width: 100%; text-align: left; border: 0; border-radius: 7px;
      padding: 8px 9px; margin-bottom: 3px; background: transparent;
      color: var(--muted); font-size: 11px; cursor: pointer;
    }
    .crc-nav button:hover { background: rgba(27,197,232,.08); color: var(--text); }
    .crc-nav button.active { background: rgba(27,197,232,.15); color: var(--accent); font-weight: 700; }
    .crc-nav button.recommended { box-shadow: inset 2px 0 0 var(--accent); }
    .crc-nav button.nav-hint { font-size: 9px; color: var(--dim); display: block; margin-top: 1px; }
    .crc-center { padding: 12px; overflow-y: auto; min-height: 0; }
    .crc-side {
      border-left: 1px solid var(--line); padding: 10px; overflow-y: auto;
      background: rgba(4,10,18,.4); font-size: 12px;
    }
    .crc-bottom {
      border-top: 1px solid var(--line); padding: 8px 12px;
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
      background: rgba(4,10,18,.6); font-size: 11px;
    }
    .crc-stat b { display: block; font-size: 15px; color: var(--accent); }
    .crc-stat span { color: var(--dim); font-size: 10px; }

    table.data { width: 100%; border-collapse: collapse; font-size: 11px; }
    table.data th, table.data td { border: 1px solid var(--line); padding: 6px 8px; text-align: left; }
    table.data th { background: rgba(27,197,232,.08); color: var(--muted); font-weight: 700; }
    .card {
      border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px;
      margin-bottom: 8px; background: rgba(8,18,32,.6);
    }
    .card.ok { border-color: rgba(61,214,140,.4); }
    .card.warn { border-color: rgba(255,184,77,.4); }
    .card.bad { border-color: rgba(255,92,122,.4); }
    .tag { display: inline-block; padding: 2px 7px; border-radius: 999px; font-size: 10px; font-weight: 700; }
    .tag.low { background: rgba(61,214,140,.15); color: var(--ok); }
    .tag.med { background: rgba(255,184,77,.15); color: var(--warn); }
    .tag.high { background: rgba(255,92,122,.15); color: var(--bad); }

    .arch-wrap { display: flex; flex-direction: column; gap: 12px; }
    .arch-legend {
      display: flex; flex-wrap: wrap; gap: 10px 16px; padding: 8px 10px;
      border: 1px solid var(--line); border-radius: 8px; font-size: 10px; color: var(--muted);
    }
    .arch-legend span { display: inline-flex; align-items: center; gap: 5px; }
    .arch-legend i {
      width: 10px; height: 10px; border-radius: 2px; display: inline-block;
    }
    .arch-layers { display: flex; flex-direction: column; gap: 0; }
    .arch-layer {
      border: 1px solid var(--line); border-radius: 0; position: relative;
      background: rgba(6, 14, 26, .55);
    }
    .arch-layer:first-child { border-radius: 10px 10px 0 0; }
    .arch-layer:last-child { border-radius: 0 0 10px 10px; }
    .arch-layer + .arch-layer { border-top: 0; }
    .arch-layer-hdr {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 12px; font-size: 10px; font-weight: 700; letter-spacing: .04em;
      text-transform: uppercase; color: var(--accent);
      background: rgba(27, 197, 232, .06); border-bottom: 1px dashed var(--line);
    }
    .arch-layer-hdr em { font-style: normal; color: var(--dim); font-weight: 500; text-transform: none; }
    .arch-layer-body {
      display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 12px; align-items: stretch;
    }
    .arch-flow-down {
      text-align: center; color: var(--dim); font-size: 11px; padding: 4px 0;
      letter-spacing: .12em;
    }
    .arch-svc {
      flex: 1 1 140px; min-width: 130px; max-width: 220px;
      padding: 10px; border-radius: 8px; border: 1px solid var(--line);
      cursor: pointer; transition: border-color .15s, box-shadow .15s;
      background: rgba(8, 18, 32, .85);
    }
    .arch-svc:hover, .arch-svc.selected {
      border-color: var(--accent); box-shadow: 0 0 0 1px rgba(27, 197, 232, .25);
    }
    .arch-svc.selected { background: rgba(27, 197, 232, .08); }
    .arch-svc.risk-low { border-left: 3px solid var(--ok); }
    .arch-svc.risk-med { border-left: 3px solid var(--warn); }
    .arch-svc.risk-high { border-left: 3px solid #ff8c42; }
    .arch-svc.risk-crit { border-left: 3px solid var(--bad); }
    .arch-svc-title { font-size: 12px; font-weight: 700; line-height: 1.25; margin-bottom: 4px; }
    .arch-svc-crypto {
      font-size: 10px; color: var(--muted); font-family: Consolas, "Segoe UI Mono", monospace;
      line-height: 1.45; margin-bottom: 6px;
    }
    .arch-svc-meta { display: flex; flex-wrap: wrap; gap: 4px; }
    .arch-svc-meta .tag { font-size: 9px; }
    .arch-detail-panel {
      border: 1px solid rgba(27, 197, 232, .35); border-radius: 10px;
      padding: 12px 14px; background: rgba(4, 12, 22, .9);
    }
    .arch-detail-panel h4 { margin: 0 0 10px; font-size: 14px; }
    .arch-detail-grid {
      display: grid; grid-template-columns: 118px 1fr; gap: 6px 12px;
      font-size: 11px; line-height: 1.5;
    }
    .arch-detail-grid dt { color: var(--dim); margin: 0; font-weight: 600; }
    .arch-detail-grid dd { margin: 0; color: var(--text); }
    .arch-detail-actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }

    .evidence-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .ev-chip {
      padding: 4px 8px; border-radius: 6px; font-size: 10px;
      border: 1px solid var(--line); background: rgba(27,197,232,.08); cursor: pointer;
    }
    .ev-chip.added { border-color: var(--ok); background: rgba(61,214,140,.12); }
    .ev-chip.bad-ev { border-color: var(--bad); }

    .risk-radar { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .radar-card { padding: 8px; border-radius: 8px; border: 1px solid var(--line); font-size: 11px; }
    .radar-card b { display: block; margin-bottom: 2px; }

    .openssl {
      background: #050d14; border: 1px solid var(--line); border-radius: 8px;
      padding: 10px; font-size: 11px; line-height: 1.55; color: #9fd4ff;
      margin: 10px 0; white-space: pre-wrap;
    }

    .match-grid { display: grid; gap: 8px; }
    .match-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-items: center; }
    .match-row select {
      width: 100%; padding: 7px; border-radius: 7px; border: 1px solid var(--line);
      background: rgba(4,12,22,.9); color: var(--text);
    }

    .report-section { margin-bottom: 12px; }
    .report-section h4 { margin: 0 0 6px; font-size: 13px; }
    .report-section textarea {
      width: 100%; min-height: 72px; border-radius: 8px; border: 1px solid var(--line);

  function clamp(n) { return Math.max(0, Math.min(100, Math.round(n))); }
  function getOverallScore() {
    return clamp((scores.total + scores.confidence + scores.evidence + scores.report) / 4);
  }
  function getPenaltyAmount(key, units) {
    units = units || 1;
    if (key === "threat_per_match") {
      return Math.min(SCORE_WEIGHTS.threat_max, SCORE_WEIGHTS.threat_per_match * units);
    }
    var w = SCORE_WEIGHTS[key];
    return w ? Math.round(w * units) : 5;
  }
  function deductScore(amount, affectConfidence) {
    amount = Math.max(1, Math.round(amount));
    scores.total = clamp(scores.total - amount);
    if (affectConfidence !== false) scores.confidence = clamp(scores.confidence - amount);
    refreshScoreUI();
    return amount;
  }
  function penalizeWrong(key, units) {
    var amount = getPenaltyAmount(key, units);
    deductScore(amount, true);
    state.wrongPathCount++;
    return amount;
  }
  function penalizeHint() {
    var mult = HINT_STAGE_MULT[state.stage] || 1;
    return deductScore(Math.round(HINT_PENALTY_BASE * mult), false);
  }

    var got = KEY_EVIDENCE_IDS.filter(function (id) { return state.evidenceTray.indexOf(id) >= 0; }).length;

    renderTaskbar();
    updateClock();
    setInterval(updateClock, 30000);

    showMsgNotify();

      if (!state.chatOpened && state.stage === 0) maybeIdleWarn();

  function pad2(n) { return n < 10 ? "0" + n : String(n); }
  function formatChrono(ms) {

    var h = Math.floor(sec / 3600);
    sec %= 3600;
    var m = Math.floor(sec / 60);
    sec %= 60;
    if (h > 0) return pad2(h) + ":" + pad2(m) + ":" + pad2(sec);
    return pad2(m) + ":" + pad2(sec);
  }

  function stopSimChrono(hide) {

  function openWindow(id) {
    if (!state.isLoggedIn) return;
    if (id !== "bexachat" && state.stage === 0 && !state.chatOpened) {
      maybeIdleWarn();
    }
    if (id === "bexachat") {
      state.chatOpened = true;
      document.getElementById("msgNotifyWrap").classList.add("hidden");
      if (state.messagesMetehan.length === 0 && state.messagesOzge.length === 0) initChat();
      if (state.pendingChatPeer) {
        state.chatPeer = state.pendingChatPeer;
        state.pendingChatPeer = null;
      } else {
        state.chatPeer = "metehan";
      }
    }
    if (id === "crc" && state.stage === 0) {
      completeStage(1);
    }
    if (state.windows[id]) {
      if (state.minimized[id]) {
        state.minimized[id] = false;
        document.getElementById("win-" + id).classList.remove("hidden");
      }
      focusWindow(id);
      renderWindowBody(id);
      if (id === "bexachat") scrollChatToBottom();
      return;
    }
    var def = appDefs[id];
    if (!def) return;
    state.windows[id] = true;
    state.z += 1;
    var w = document.createElement("div");
    w.className = "win";
    w.id = "win-" + id;
    w.style.cssText = "left:" + def.x + "px;top:" + def.y + "px;width:" + def.w + "px;height:" + def.h + "px;z-index:" + state.z;

      '<div class="win-body" id="body-' + id + '"></div>';
    document.getElementById("windows").appendChild(w);
    bindDrag(id);
    state.selectedIcon = id;

    renderWindowBody(id);
    if (id === "bexachat") scrollChatToBottom();

  function bindDrag(id) {
    var win = document.getElementById("win-" + id);
    var bar = win.querySelector(".win-title");
    var dragging = false, ox, oy, sl, st;
    bar.addEventListener("mousedown", function (e) {
      if (e.target.classList.contains("win-ctrl")) return;
      if (state.maximized[id]) return;
      dragging = true;
      focusWindow(id);
      ox = e.clientX; oy = e.clientY;
      sl = win.offsetLeft; st = win.offsetTop;
      e.preventDefault();
    });
    document.addEventListener("mousemove", function (e) {
      if (!dragging) return;
      win.style.left = (sl + e.clientX - ox) + "px";
      win.style.top = (st + e.clientY - oy) + "px";
    });
    document.addEventListener("mouseup", function () { dragging = false; });
    win.addEventListener("mousedown", function () { focusWindow(id); });
  }

  function addEvidence(id, silent) {
    var ev = EVIDENCE[id];
    if (!ev) return;
    if (state.evidenceTray.indexOf(id) >= 0) return;
    if (!ev.valid) {
      addChatMessage("Metehan", "Bu kanıt bu denetimin ana kanıtı değil veya yanıltıcı bağlam sağlıyor.", "bad", "metehan");
      var badAmt = penalizeWrong("bad_evidence");
      scores.evidence = clamp(scores.evidence - badAmt);
      if (!silent) showToast("−" + badAmt + " puan (toplam ve güven)", "bad");
      return;
    }
    state.evidenceTray.push(id);
    refreshEvidenceScore();
    if (!silent) showToast("Kanıt eklendi: " + id, "ok");
    refreshAllWindows();
  }

  function removeEvidence(id) {
    state.evidenceTray = state.evidenceTray.filter(function (x) { return x !== id; });
    refreshEvidenceScore();
  }

  function threatSelectId(sys) {
    return "threat-" + sys.replace(/\s+/g, "_");
  }

  function syncThreatMatchesFromDOM() {
    Object.keys(THREAT_CORRECT).forEach(function (sys) {
      var el = document.getElementById(threatSelectId(sys));
      if (el) state.threatMatches[sys] = el.value;
    });
  }

  function setThreatMatch(sys, value) {
    state.threatMatches[sys] = value;
  }

  function submitThreatModel() {
    var models = [
      "Pasif ağ dinleyicisi",
      "Aktif ağ saldırganı",
      "Uzun vadeli / harvest-now-decrypt-later",
      "İçeriden tehdit / fazla yetkili servis hesabı",
      "Sahte imza / yanlış bağlamda imza doğrulama",
      "Aktif ağ saldırganı + legacy protokol"
    ];
    var systems = Object.keys(THREAT_CORRECT);
    var ok = true;
    syncThreatMatchesFromDOM();
    systems.forEach(function (sys) {
      var val = state.threatMatches[sys];
      if (val !== THREAT_CORRECT[sys]) ok = false;
    });
    state.threatSubmitted = true;
    if (ok) {
      addChatMessage("Metehan", "İyi. Kriptografik kararlar saldırgan modeli olmadan verilmez.", "ok", "metehan");
      addOzgeMessage("{ad}, tehdit modeli tamam görünüyor. Şimdi TLS Inspector'u açıp oradan devam et.", "ok");
      advanceStage(4);
    } else {
      var wrongCount = 0;
      systems.forEach(function (sys) {
        if (state.threatMatches[sys] !== THREAT_CORRECT[sys]) wrongCount++;
      });
      var threatPenalty = penalizeWrong("threat_per_match", wrongCount);
      addOzgeMessage(
        "{ad}, birkaç eşleştirme yanlış kalmış. Tüm cevapları burada vermiyorum — CRC'de tekrar dene veya BexaChat'te 💡 İpucu Al (puan düşer). Yine de TLS Inspector ile devam edebilirsin.",
        "warn"
      );
      showToast("−" + threatPenalty + " puan (" + wrongCount + " yanlış eşleştirme)", "warn");
      advanceStage(4);
    }
    refreshAllWindows();
  }

  function similarity(a, b) {
    a = a.toLowerCase(); b = b.toLowerCase();
    var words = b.split(/\s+/).filter(function (w) { return w.length > 4; });
    var hit = words.filter(function (w) { return a.indexOf(w) >= 0; }).length;
    return words.length ? hit / words.length : 0;
  }

  function monitorDrift(val, cfg, spikeChance) {
    var delta = (Math.random() - 0.48) * cfg.step;
    if (Math.random() < (spikeChance || 0.04)) delta += cfg.step * (2 + Math.random() * 2);
    return Math.max(cfg.min, Math.min(cfg.maxVal, val + delta));
  }

  function setupMonitorCanvas(canvas) {
    var w = MONITOR_CHART_W;
    var h = MONITOR_CHART_H;
    var dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
    var ctx = canvas.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { ctx: ctx, w: w, h: h };
  }

  function drawMonitorChart(ctx, w, h, data, cfg) {
    ctx.clearRect(0, 0, w, h);
    var pad = { t: 6, r: 6, b: 14, l: 28 };
    var gw = w - pad.l - pad.r;
    var gh = h - pad.t - pad.b;
    ctx.strokeStyle = "rgba(120,180,220,.12)";
    ctx.lineWidth = 1;
    for (var gi = 0; gi <= 3; gi++) {
      var gy = pad.t + (gh * gi) / 3;
      ctx.beginPath();
      ctx.moveTo(pad.l, gy);
      ctx.lineTo(pad.l + gw, gy);
      ctx.stroke();
    }
    var max = cfg.max;
    var pts = data.map(function (v, i) {
      return { x: pad.l + (i / Math.max(1, data.length - 1)) * gw, y: pad.t + gh - (v / max) * gh };
    });
    if (pts.length < 2) return;
    var r = parseInt(cfg.color.slice(1, 3), 16);
    var g = parseInt(cfg.color.slice(3, 5), 16);
    var b = parseInt(cfg.color.slice(5, 7), 16);
    var grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + gh);
    grad.addColorStop(0, "rgba(" + r + "," + g + "," + b + ",.32)");
    grad.addColorStop(1, "rgba(" + r + "," + g + "," + b + ",.02)");
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pad.t + gh);
    pts.forEach(function (p) { ctx.lineTo(p.x, p.y); });
    ctx.lineTo(pts[pts.length - 1].x, pad.t + gh);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (var i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.strokeStyle = cfg.color;
    ctx.lineWidth = 2;
    ctx.lineJoin = "round";
    ctx.stroke();
    var last = pts[pts.length - 1];
    ctx.fillStyle = cfg.color;
    ctx.beginPath();
    ctx.arc(last.x, last.y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "rgba(136,168,197,.75)";
    ctx.font = "9px Consolas, monospace";
    ctx.textAlign = "right";
    ctx.fillText(Math.round(max * 0.75) + (cfg.unit.indexOf("%") >= 0 ? "%" : ""), pad.l - 4, pad.t + gh * 0.28 + 3);
    ctx.fillText("0", pad.l - 4, pad.t + gh + 3);
  }

  function startMonitorLive() {
    stopMonitorLive();
    if (!state.windows.monitor || state.minimized.monitor) return;
    if (!document.getElementById("body-monitor")) return;
    var series = {};
    Object.keys(MONITOR_CFG).forEach(function (key) {
      var cfg = MONITOR_CFG[key];
      var canvas = document.getElementById("mon-chart-" + key);
      if (!canvas) return;
      var hist = [];
      for (var i = 0; i < MONITOR_POINTS; i++) hist.push(cfg.start + (Math.random() - 0.5) * cfg.step);
      series[key] = { cfg: cfg, canvas: canvas, data: hist, surface: setupMonitorCanvas(canvas) };
    });
    function tick() {
      if (!document.getElementById("body-monitor")) { stopMonitorLive(); return; }
      Object.keys(series).forEach(function (key) {
        var s = series[key];
        var cfg = s.cfg;
        var last = s.data[s.data.length - 1];
        var spike = key === "api" ? 0.07 : key === "cpu" ? 0.06 : 0.03;
        s.data.push(monitorDrift(last, cfg, spike));
        if (s.data.length > MONITOR_POINTS) s.data.shift();
        drawMonitorChart(s.surface.ctx, s.surface.w, s.surface.h, s.data, cfg);
        var v = s.data[s.data.length - 1];
        var valEl = document.getElementById("mon-val-" + key);
        var tagEl = document.getElementById("mon-tag-" + key);
        var miniEl = document.getElementById("mon-mini-" + key);
        if (valEl) valEl.textContent = key === "net" ? v.toFixed(1) + cfg.unit : Math.round(v) + cfg.unit;
        if (miniEl) {
          if (key === "cpu") miniEl.textContent = "8 çekirdek · dengeli yük";
          else if (key === "ram") miniEl.textContent = "Önbellek stabil";
          else if (key === "net") miniEl.textContent = "↓" + (v * 0.62).toFixed(0) + " ↑" + (v * 0.34).toFixed(0) + " Mbps";
          else miniEl.textContent = "p95 " + Math.round(v * 1.12) + " ms";
        }
        if (tagEl) {
          var ok = (key === "cpu" && v < 50) || (key === "ram" && v < 75) || key === "net" || (key === "api" && v < 80);
          tagEl.textContent = ok ? "Normal" : "Yüksek";
          tagEl.className = "sysmon-tag " + (ok ? "ok" : "warn");
        }
      });
    }
    tick();
    monitorLive.timer = setInterval(tick, 650);
  }
